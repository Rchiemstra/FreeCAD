# result.schema.yaml — JSON Schema for sim_runs/<run_id>/result.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: Simulation Run Result
type: object
required:
  - run_id
  - status
  - scenario
  - robot
  - world
  - timestamp
  - assertions
properties:
  run_id:
    type: string
  status:
    type: string
    enum: [pass, fail, error, unknown]
  error:
    type: ["string", "null"]
  scenario:
    type: string
  robot:
    type: string
  world:
    type: string
  timestamp:
    type: string
  versions:
    type: object
    additionalProperties: true
  input_hashes:
    type: object
    additionalProperties:
      type: string
    description: scenario_yaml, fcstd, export_urdf, world_sdf, etc.
  telemetry_summary:
    type: object
    additionalProperties: true
  metadata:
    type: object
    description: Run policy, paths, lifecycle summary, and auxiliary hashes
    additionalProperties: true
  assertions:
    type: array
    items:
      type: object
      required: [type, passed, message]
      properties:
        type:
          type: string
        passed:
          type: boolean
        message:
          type: string
        detail:
          type: ["object", "string", "null"]
      additionalProperties: true
additionalProperties: false
