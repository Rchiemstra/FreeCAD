[pytest]
# Live integration marks — excluded from CI via -m "not gazebo and not freecad and not needs_freecad"
# and tests/conftest.py (RUN_GAZEBO_LIVE opt-in).
markers =
    freecad: requires FreeCAD MCP on localhost:9875 (opt-in: RUN_GAZEBO_LIVE=1)
    gazebo: requires live Gazebo stack (opt-in: RUN_GAZEBO_LIVE=1)
    needs_freecad: requires FreeCADCmd + robots/arm_2dof.FCStd (skipped in CI)
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
