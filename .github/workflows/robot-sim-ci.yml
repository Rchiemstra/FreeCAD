# Robot simulation rig CI (bridge, runner, Docker E2E).
# Live host tests (RUN_GAZEBO_LIVE) are never run here.
#
# Local mirror: bash scripts/ci/run_local.sh

name: Robot simulation CI

on:
  push:
    branches: [main, master, verify-freecad, 'verify-*']
    paths:
      - '.github/workflows/robot-sim-ci.yml'
      - 'bridge/**'
      - 'runner/**'
      - 'iteration/**'
      - 'addons/SimWorkbench/**'
      - 'tests/**'
      - 'e2e/**'
      - 'docker/**'
      - 'worlds/**'
      - 'robots/**'
      - 'scripts/ci/**'
      - 'scripts/gazebo_lifecycle_common.sh'
      - 'scripts/smoke_gz_lifecycle.sh'
      - 'config/**'
      - 'requirements*.txt'
      - 'pytest.ini'
  pull_request:
    paths:
      - '.github/workflows/robot-sim-ci.yml'
      - 'bridge/**'
      - 'runner/**'
      - 'iteration/**'
      - 'addons/SimWorkbench/**'
      - 'tests/**'
      - 'e2e/**'
      - 'docker/**'
      - 'worlds/**'
      - 'robots/**'
      - 'scripts/ci/**'
      - 'scripts/gazebo_lifecycle_common.sh'
      - 'scripts/smoke_gz_lifecycle.sh'
      - 'config/**'
      - 'requirements*.txt'
      - 'pytest.ini'
  workflow_dispatch:

concurrency:
  group: robot-sim-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  RUN_GAZEBO_LIVE: "0"
  E2E_VERSION_STRICT: "1"

jobs:
  offline-pytest:
    name: Offline pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-bridge.txt
            requirements-dev.txt

      - name: Run offline pytest
        run: bash scripts/ci/run_offline_pytest.sh

  lifecycle-smoke:
    name: Gazebo lifecycle smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-bridge.txt

      - name: Lifecycle smoke (offline)
        run: bash scripts/ci/run_lifecycle_smoke.sh

  docker-e2e:
    name: Strict Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [offline-pytest, lifecycle-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify robot source lock
        run: python3 e2e/verify_robot_source.py

      - name: Strict Docker E2E
        run: bash scripts/ci/run_docker_e2e.sh

      - name: Upload E2E console log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-console-log
          path: sim_runs/e2e_*/console.log
          if-no-files-found: ignore
          retention-days: 7
